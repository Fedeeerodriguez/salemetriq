name: Supabase keep-alive

# Pega a Supabase una vez al día para que el proyecto (plan free) no se pause
# por inactividad. Corre en la infra de GitHub, no depende del backend.
#
# Usa la ANON key (no la service_role) — es de bajo privilegio y suficiente para
# el ping. El endpoint devuelve HTTP 200 aunque no haya filas (p. ej. con RLS
# activo), así que el keep-alive se cumple igual.
#
# Requiere en el repo los secrets: SUPABASE_URL y SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC = 09:00 Argentina
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (lectura liviana, anon key)
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Faltan los secrets SUPABASE_URL y/o SUPABASE_ANON_KEY en el repo."
            exit 1
          fi
          for intento in 1 2 3; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              "${{ secrets.SUPABASE_URL }}/rest/v1/users?select=id&limit=1" \
              -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}") || code=000
            echo "Intento $intento → HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Supabase OK. Keep-alive cumplido."
              exit 0
            fi
            sleep 10
          done
          echo "No se pudo contactar a Supabase tras 3 intentos."
          exit 1
