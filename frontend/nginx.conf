# Template de nginx — envsubst reemplaza ${BACKEND_URL} al arrancar el contenedor.
# Las variables $host, $uri, etc. NO son env → quedan intactas (nginx las resuelve).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip para assets de texto
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → backend FastAPI (mismo origen, sin CORS).
    # proxy_pass sin path final → reenvía la URI completa (/api/...) tal cual.
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Assets con hash → cache larga e inmutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — cualquier ruta de React Router cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
