# Template de nginx — envsubst reemplaza ${BACKEND_URL} al arrancar el contenedor.
# Las variables $host, $uri, etc. NO son env → quedan intactas (nginx las resuelve).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip para assets de texto
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → backend FastAPI (mismo origen, sin CORS).
    # Usamos un resolver + variable en proxy_pass para que nginx NO resuelva el
    # host del backend al arrancar (si no existe, no crashea): lo resuelve en cada
    # request. 127.0.0.11 es el DNS interno de Docker. Si el backend está caído,
    # devuelve 502 pero el frontend sigue vivo.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_url ${BACKEND_URL};
        proxy_pass $backend_url$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Assets con hash → cache larga e inmutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — cualquier ruta de React Router cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
